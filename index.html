<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>ELECTIVOS DE DISEÑO</title>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            @import url("https://fonts.googleapis.com/css2?family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap");

            :root {
                --color-oscurisimo: hsl(103, 10%, 10%);
                --color-oscuro: hsl(103, 10%, 30%);
                --color-normal: hsl(103, 10%, 60%);
                --color-iluminado:  hsl(103, 10%, 80%);
                --color-iluminadisimo: hsl(103, 25%, 90%);
                --fuente: "Source Code Pro", monospace;
            }

            body {
                font-family: var(--fuente);
                color: var(--color-normal);
                text-align: center;
                font-size: 100%;
            }

            a {
                color: var(--color-oscuro);
                text-decoration: none;
            }

            a:hover {
                color: var(--color-oscurisimo);
                text-decoration: underline;
            }
            div#contenedor {
                margin: 1rem auto;
                width: 90%;
				max-width: 980px;
            }

            h1 {
               margin: 1rem 0;
               font-weight: 400;
               font-size: calc(100% + 3vw + 3vh);
               }

            h2 {
               margin: 3rem 0;
               font-weight: 400;
               letter-spacing: 0.25rem;
               font-size: calc(100% + 1vw + 1vh);
               color: var(--color-oscuro);
            }

            input {
               border: 0.1rem solid var(--color-iluminado);
               padding: 0.5rem 1rem;
               font-family: inherit;
               font-size: 15px;
               color: var(--color-oscuro);
               outline: none;
               margin-bottom: 1.5rem;
               width: 100%;
               display: block;
               background-image:url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M8.48 10.901C11.211 10.227 13 7.837 13 5A5 5 0 0 0 3 5c0 2.837 1.789 5.227 4.52 5.901l-.244.487a.25.25 0 1 0 .448.224l.04-.08c.009.17.024.315.051.45.068.344.208.622.448 1.102l.013.028c.212.422.182.85.05 1.246-.135.402-.366.751-.534 1.003a.25.25 0 0 0 .416.278l.004-.007c.166-.248.431-.646.588-1.115.16-.479.212-1.051-.076-1.629-.258-.515-.365-.732-.419-1.004a2 2 0 0 1-.037-.289l.008.017a.25.25 0 1 0 .448-.224zM4.352 3.356a4 4 0 0 1 3.15-2.325C7.774.997 8 1.224 8 1.5s-.226.496-.498.542c-.95.162-1.749.78-2.173 1.617a.6.6 0 0 1-.52.341c-.346 0-.599-.329-.457-.644"/></svg>');               background-repeat: no-repeat;
               background-size: 1rem;
               background-position: 99% center;
            }

            input::placeholder {
               color: var(--color-iluminado);
            }

            input:focus {
               border-color: var(--color-normal);
            }

            div#contenedordetabla {
               overflow-x: auto;
               font-size: 90%;
            }

            table {
               width: 100%;
               border-collapse: collapse;
               text-align: left;
               margin-bottom: 3rem;
            }

            thead {
               background: var(--color-iluminadisimo);
               color: var(--color-oscuro);
            }

            tbody {
               color: var(--color-normal);
            }

            td,
            th {
               border: 1px solid var(--color-normal);
               padding: 0.75rem;
            }

            th:nth-child(1),
            td:nth-child(1),
            th:nth-child(4),
            td:nth-child(4) {
            text-align: center;
            }

            td:nth-child(2) {
            color: var(--color-oscuro);
            font-weight: 800;
            }

            td:nth-child(3) {
               font-style: italic;
            }
        </style>
    </head>
    <body>
        <div id="contenedor">
            <h1>°⋆‧ 🐟︎ ˚꩜｡·</h1>
            <h2>PROYECTOS DE TITULO</h2>

            <input type="text" id="elInput" placeholder="Filtrar electivos…" />
            <div id="contenedordetabla">
                <table>
                    <thead>
                        <tr>
                            <th>Titulad@</th>
                            <th>Proyecto</th>
                            <th>Nota</th>
                            <th>Categoria</th>
							<th>Prof. Guía</th>
                        </tr>
                    </thead>
                    <tbody id="este"></tbody>
                </table>
            </div>
			<?xml version="1.0" encoding="UTF-8"?>
        </div>

        <script>
            const t = document.querySelector("#este");
            const URL = "https://api.myjson.online/v1/records/ce2ffa1f-d059-4c45-b9e8-db448dd8ebfc";

            fetch(URL)
                .then((respuesta) => {
                    if (!respuesta.ok) {
                        throw new Error("Error HTTP: " + respuesta.status);
                    }
                    return respuesta.json();
                })
                .then((datos) => {
                    var trabajo = datos.data;
                    console.log(trabajo);
                    trabajo.forEach((x) => {
                        t.innerHTML += `<tr style="${x.ok == 1 ? "background-color: var(--color-iluminadisimo); color: var(--color-oscurisimo)" : ""}">
						<td>${x.name}</td>
						<td><a href="${x.repository}" target="_blank">${x.about}</a></td>
                        <td>${x.grade}</td>
                        <td>${x.category}</td>
                        <td>${x.tutor}</td>
						</tr>`;
                    });
                })
                .catch((error) => {
                    console.error("Algo salió mal:", error);
                });

            function sinAcentos(str) {
                return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            }

            document.getElementById("elInput").addEventListener("keyup", function () {
                const valor = sinAcentos(this.value.toLowerCase());
                document.querySelectorAll("#este tr").forEach(function (fila) {
                    fila.style.display = sinAcentos(fila.textContent.toLowerCase()).includes(valor) ? "" : "none";
                });
            });
        </script>
    </body>
</html>
